<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* pages.css와 같은 토큰 — 메인 페이지는 스크롤이 필요해서 독립 스타일 */
      :root {
        --bg: #0c0c0e;
        --text: #f4f2ec;
        --muted: #807d75;
        --line: rgba(255, 255, 255, 0.1);
        --panel: rgba(255, 255, 255, 0.045);
        --accent: #d8a24a;
        --sans: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        --mono: 'Space Mono', ui-monospace, monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100dvh;
        -webkit-tap-highlight-color: transparent;
        animation: fade 0.6s ease;
      }
      /* 다크룸 비네트 (뷰어와 동일) */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        background: radial-gradient(
          120% 100% at 50% 40%,
          transparent 55%,
          rgba(0, 0, 0, 0.55) 100%
        );
      }

      .wrap {
        max-width: 640px;
        margin: 0 auto;
        padding: clamp(48px, 10vh, 110px) 24px 80px;
      }

      header {
        text-align: center;
        margin-bottom: clamp(40px, 8vh, 72px);
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 18px;
      }
      h1 {
        font-size: clamp(48px, 12vw, 96px);
        font-weight: 500;
        letter-spacing: 0.04em;
        line-height: 0.95;
      }
      h1 .dot {
        color: var(--accent);
      }
      .meta {
        margin-top: 18px;
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--muted);
      }

      /* ---------- 필름 인덱스 리스트 ---------- */
      .index {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 18px;
        text-decoration: none;
        color: inherit;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 24px;
        transition:
          border-color 0.18s ease,
          background 0.18s ease,
          transform 0.15s ease;
      }
      .row:hover,
      .row:focus-visible {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(216, 162, 74, 0.5);
        transform: translateY(-2px);
        outline: none;
      }
      .row .no {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.1em;
        min-width: 3ch;
      }
      .row .name {
        font-size: clamp(20px, 4.6vw, 26px);
        font-weight: 500;
        letter-spacing: 0.06em;
        flex: 1;
      }
      .row .count {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
      .row .arrow {
        color: var(--muted);
        transition: color 0.18s ease, transform 0.18s ease;
      }
      .row:hover .arrow {
        color: var(--accent);
        transform: translateX(3px);
      }
      .row .arrow svg {
        width: 16px;
        height: 16px;
        display: block;
        transform: translateY(2px);
      }

      .empty,
      .error {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 14px;
        padding: 44px 24px;
        text-align: center;
        line-height: 2;
      }
      .empty code {
        color: var(--accent);
      }

      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="eyebrow">Photo Album</div>
        <h1>GALLERY<span class="dot">.</span></h1>
        <p class="meta" id="meta">불러오는 중…</p>
      </header>

      <div class="index" id="list"></div>
    </div>

    <script>
      (async function () {
        const list = document.getElementById('list');
        const meta = document.getElementById('meta');

        let manifest;
        try {
          const res = await fetch('assets/manifest.json', {
            cache: 'no-store',
          });
          manifest = await res.json();
        } catch (e) {
          meta.textContent = '';
          list.innerHTML =
            '<div class="error">manifest.json을 불러올 수 없습니다.<br>' +
            'node scripts/generate-manifest.js 를 먼저 실행했는지 확인하세요.</div>';
          return;
        }

        const days = manifest.days || [];
        const totalPhotos = days.reduce((s, d) => s + d.count, 0);
        meta.textContent = days.length + ' ALBUMS · ' + totalPhotos + ' PHOTOS';

        if (days.length === 0) {
          list.innerHTML =
            '<div class="empty">아직 앨범이 없어요.<br>' +
            '<code>assets/images/day01/</code> 폴더에 사진을 넣으면<br>' +
            '여기 자동으로 나타납니다.</div>';
          return;
        }

        days.forEach((day, i) => {
          const a = document.createElement('a');
          a.className = 'row';
          a.href = 'viewer.html?day=' + encodeURIComponent(day.id);

          const no = String(i + 1).padStart(2, '0');
          a.innerHTML =
            '<span class="no">' + no + '</span>' +
            '<span class="name">' + day.title + '</span>' +
            '<span class="count">' + day.count + ' 장</span>' +
            '<span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';

          list.appendChild(a);
        });
      })();
    </script>
  </body>
</html>
